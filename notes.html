<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Notes</title>
<link rel="stylesheet" href="vault-core.css">
<link rel="stylesheet" href="vault-modal.css">
<link rel="stylesheet" href="vault-gamification.css">
<link rel="stylesheet" href="vault-mobile.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={corePlugins:{preflight:false}}</script>
<style>
[x-cloak]{display:none!important}

.notes-grid { column-count:2; column-gap:10px; }
.note-card { break-inside:avoid; background:var(--card); border:1px solid var(--cardb); border-radius:10px; padding:14px; margin-bottom:10px; cursor:pointer; transition:border-color .15s; }
.note-card:hover { border-color:var(--tx3); }
.note-card.pinned { border-left:3px solid var(--wn); }
.note-card.starred { border-left:3px solid var(--ac); }
@media(max-width:700px){ .notes-grid{ column-count:1; } }
</style>
</head>
<body x-data="pageApp()" x-cloak>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-title">Vault</div>
    <div class="topbar-right">
      <a href="index.html" class="topbar-user" style="text-decoration:none">
        <div class="gm-level-badge sm">8</div>
        <div class="topbar-av" style="background:var(--ac)">J</div>José
      </a>
      <button class="topbar-cog"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="17" height="17"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
  </div>

  <!-- Layout -->
  <div class="layout">

    <!-- Sidebar -->
    <aside class="lnav">
      <div class="lnav-block">
        <a href="index.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
        <a href="habits.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Habits</a>
        <a href="tasks.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Tasks</a>
        <a href="projects.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Projects</a>
        <a href="maintenance.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Maintenance</a>
        <a href="calendar.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendar</a>
        <a href="performance.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M12 20V10M6 20V4M18 20v-6"/></svg>Performance</a>
        <a href="notes.html" class="lnav-item active" style="color:var(--actx)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Notes</a>
        <a href="shopping.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Shopping</a>
        <a href="budget.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Budget</a>
      </div>
      <div class="gm-sidebar-widget">
        <div class="gm-sw-header">
          <div class="gm-level-badge">8</div>
          <div><div style="font-size:11px;font-weight:600">Level 8 · Consistent</div><div style="font-size:9px;color:var(--tx3)">2,340 / 3,000 XP</div></div>
        </div>
        <div class="gm-xp-bar"><div class="gm-xp-fill" style="width:78%"></div></div>
        <div style="font-size:9px;color:var(--tx3);margin-top:4px">660 XP to Level 9</div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">

      <!-- Page header -->
      <div class="page-header">
        <div>
          <h1 class="page-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Notes</h1>
          <div class="page-sub">Quick notes and thoughts</div>
        </div>
        <div class="page-actions">
          <input type="text" class="form-input" placeholder="Search notes…" x-model="search" style="width:200px;padding:6px 10px;font-size:11px">
          <button class="btn-primary">+ New Note</button>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs">
        <button class="ftab" :class="{active:filter==='all'}" @click="filter='all'">All</button>
        <button class="ftab" :class="{active:filter==='pinned'}" @click="filter='pinned'">📌 Pinned</button>
        <button class="ftab" :class="{active:filter==='starred'}" @click="filter='starred'">⭐ Starred</button>
      </div>

      <!-- Notes grid -->
      <div class="notes-grid">
        <template x-for="n in filtered" :key="n.id">
          <div class="note-card" :class="{pinned:n.pinned, starred:n.starred}" @click="openNoteModal(n)">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
              <div style="font-size:12px;font-weight:700;color:var(--tx)" x-text="n.title"></div>
              <div style="display:flex;gap:4px;flex-shrink:0">
                <span x-show="n.pinned" style="font-size:11px">📌</span>
                <span x-show="n.starred" style="font-size:11px">⭐</span>
              </div>
            </div>
            <div style="font-size:11px;color:var(--tx2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden" x-text="n.content"></div>
            <div style="font-size:9px;color:var(--tx3);margin-top:8px;display:flex;align-items:center;gap:6px">
              <span x-text="n.date"></span>
              <div style="width:8px;height:8px;border-radius:2px;flex-shrink:0" :style="`background:${n.color}`"></div>
            </div>
          </div>
        </template>
      </div>

    </main>
  </div>

  <!-- Bottom nav -->
  <nav class="bnav">
    <div class="bnav-inner">
      <a href="index.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="20" height="20"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</a>
      <a href="habits.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="20" height="20"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Habits</a>
      <a href="tasks.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="20" height="20"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Tasks</a>
      <a href="maintenance.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="20" height="20"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Maint.</a>
      <div class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="20" height="20"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>More</div>
    </div>
  </nav>

  <!-- Modal -->
  <div class="vm-overlay" id="vault-modal" @click.self="closeModal()">
    <div class="vm-dialog">
      <div class="vm-header">
        <div class="vm-hdot" id="vm-dot"></div>
        <div class="vm-hgroup">
          <div class="vm-htitle" id="vm-title"></div>
          <div class="vm-hsub" id="vm-sub"></div>
        </div>
        <button class="vm-close" @click="closeModal()">&times;</button>
      </div>
      <div class="vm-body" id="vm-body"></div>
      <div class="vm-footer" id="vm-footer"></div>
    </div>
  </div>

  <script>
  function pageApp() {
    return {
      filter: 'all',
      search: '',
      loading: true,
      error: null,
      notes: [],
      showForm: false,
      editId: null,
      form: { title: '', content: '', color: 'var(--ac)', tags: '' },

      get filtered() {
        let list = this.notes;
        if (this.filter === 'pinned') list = list.filter(n => n.pinned);
        if (this.filter === 'starred') list = list.filter(n => n.starred);
        if (this.search) {
          const q = this.search.toLowerCase();
          list = list.filter(n => n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q));
        }
        return list;
      },

      async init() {
        document.addEventListener('keydown', e => { if (e.key === 'Escape') this.closeModal(); });
        await this.fetchNotes();
      },

      async fetchNotes() {
        this.loading = true;
        this.error = null;
        try {
          const res = await fetch('/api/notes');
          if (!res.ok) throw new Error('Failed to load notes: ' + res.status);
          const data = await res.json();
          this.notes = data.map(n => ({
            id: n.Id, title: n.Title, content: n.Content,
            color: n.Color || 'var(--ac)',
            pinned: n.IsPinned, starred: n.IsStarred, tags: n.Tags || [],
            date: n.UpdatedAt
              ? new Date(n.UpdatedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })
              : '---',
          }));
        } catch (err) {
          this.error = err.message;
          console.error('[notes] fetchNotes:', err);
        } finally {
          this.loading = false;
        }
      },

      openAddForm() {
        this.editId = null;
        this.form = { title: '', content: '', color: 'var(--ac)', tags: '' };
        this.showForm = true;
      },

      openEditForm(note) {
        this.editId = note.id;
        this.form = {
          title: note.title, content: note.content, color: note.color,
          tags: Array.isArray(note.tags) ? note.tags.join(', ') : (note.tags || ''),
        };
        this.showForm = true;
      },

      async saveNote() {
        if (!this.form.title.trim()) return;
        try {
          const res = await fetch('/api/notes', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title: this.form.title, content: this.form.content, color: this.form.color,
              tags: this.form.tags ? this.form.tags.split(',').map(t => t.trim()).filter(Boolean) : [],
            }),
          });
          if (!res.ok) throw new Error('Failed to create note: ' + res.status);
          this.showForm = false;
          await this.fetchNotes();
        } catch (err) {
          this.error = err.message;
          console.error('[notes] saveNote:', err);
        }
      },

      async updateNote(id) {
        try {
          const res = await fetch('/api/notes/' + id, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title: this.form.title, content: this.form.content, color: this.form.color,
              tags: this.form.tags ? this.form.tags.split(',').map(t => t.trim()).filter(Boolean) : [],
            }),
          });
          if (!res.ok) throw new Error('Failed to update note: ' + res.status);
          this.showForm = false; this.editId = null;
          await this.fetchNotes();
        } catch (err) {
          this.error = err.message;
          console.error('[notes] updateNote:', err);
        }
      },

      async deleteNote(id) {
        if (!confirm('Delete this note?')) return;
        try {
          const res = await fetch('/api/notes/' + id, { method: 'DELETE' });
          if (!res.ok) throw new Error('Failed to delete note: ' + res.status);
          this.closeModal();
          await this.fetchNotes();
        } catch (err) {
          this.error = err.message;
          console.error('[notes] deleteNote:', err);
        }
      },

      async togglePin(id) {
        try {
          const res = await fetch('/api/notes/' + id + '/pin', { method: 'PATCH' });
          if (!res.ok) throw new Error('Failed to toggle pin: ' + res.status);
          const idx = this.notes.findIndex(n => n.id === id);
          if (idx !== -1) {
            this.notes = [...this.notes.slice(0, idx), { ...this.notes[idx], pinned: !this.notes[idx].pinned }, ...this.notes.slice(idx + 1)];
          }
        } catch (err) {
          this.error = err.message;
          console.error('[notes] togglePin:', err);
        }
      },

      async toggleStar(id) {
        try {
          const res = await fetch('/api/notes/' + id + '/star', { method: 'PATCH' });
          if (!res.ok) throw new Error('Failed to toggle star: ' + res.status);
          const idx = this.notes.findIndex(n => n.id === id);
          if (idx !== -1) {
            this.notes = [...this.notes.slice(0, idx), { ...this.notes[idx], starred: !this.notes[idx].starred }, ...this.notes.slice(idx + 1)];
          }
        } catch (err) {
          this.error = err.message;
          console.error('[notes] toggleStar:', err);
        }
      },

      async submitForm() {
        if (this.editId) {
          await this.updateNote(this.editId);
        } else {
          await this.saveNote();
        }
      },
            openModal({title, sub, color, body, footer}) {
        document.getElementById('vm-dot').style.background = color || 'var(--tx3)';
        document.getElementById('vm-title').textContent = title || '';
        document.getElementById('vm-sub').textContent = sub || '';
        document.getElementById('vm-body').innerHTML = body || '';
        document.getElementById('vm-footer').innerHTML = footer || '';
        document.getElementById('vault-modal').classList.add('open');
      },
      closeModal() {
        document.getElementById('vault-modal').classList.remove('open');
      },
      openNoteModal(note) {
        const body = `
          <div class="vm-section">
            <div style="font-size:13px;color:var(--tx2);line-height:1.6;white-space:pre-wrap">${note.content.replace(/</g, '&lt;')}</div>
          </div>
          <div class="vm-divider"></div>
          <div class="vm-section">
            <div class="vm-row">
              <div class="vm-col"><div class="vm-label">Date</div><div class="vm-value">${note.date}</div></div>
              <div class="vm-col"><div class="vm-label">Status</div><div class="vm-value">${note.pinned ? '📌 Pinned' : ''}${note.starred ? ' ⭐ Starred' : ''} ${!note.pinned && !note.starred ? '—' : ''}</div></div>
            </div>
          </div>`;
        this.openModal({
          title: note.title,
          sub: 'Note',
          color: note.color,
          body,
          footer: `<button class="vm-btn danger" onclick="document.getElementById('vault-modal').classList.remove('open')">Delete</button><button class="vm-btn" onclick="document.getElementById('vault-modal').classList.remove('open')">Edit</button><button class="vm-btn primary" onclick="document.getElementById('vault-modal').classList.remove('open')">Close</button>`
        });
      },
    }
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
</body>
</html>
