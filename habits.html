<style>
#habit-list{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.habit-card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s}
.habit-card.done{border-color:var(--hm-color,var(--ac))}
.hm-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.hm-cell{aspect-ratio:1;border-radius:2px;background:var(--bg3)}
.hm-cell.l1{background:color-mix(in srgb,var(--hm-color,var(--ac)) 25%,var(--bg3))}
.hm-cell.l2{background:color-mix(in srgb,var(--hm-color,var(--ac)) 45%,var(--bg3))}
.hm-cell.l3{background:color-mix(in srgb,var(--hm-color,var(--ac)) 65%,var(--bg3))}
.hm-cell.l4{background:var(--hm-color,var(--ac))}
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ftab{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);cursor:pointer}
.ftab.active{background:var(--acbg);color:var(--actx);border-color:var(--ac)}
.hm-tabs{display:flex;gap:4px;margin-top:6px}
.hmtab{font-size:9px;padding:2px 7px;border-radius:10px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx3);cursor:pointer}
.hmtab.active{background:var(--acbg);color:var(--actx);border-color:var(--ac)}
.goal-bar-wrap{margin-top:6px}
.goal-bar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.goal-bar-fill{height:100%;border-radius:2px;background:var(--hm-color,var(--ac))}
[x-cloak]{display:none!important}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.page-title{font-size:16px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:6px;margin-bottom:3px}
.page-sub{font-size:11px;color:var(--tx3)}
.lnav-block{display:flex;flex-direction:column;gap:2px}
</style>
</head>

><div class="gm-sidebar-level">Level 8 &#183; Consistent</div><div class="gm-sidebar-xp">2,340 / 3,000 XP</div></div></div><div class="gm-xp-bar"><div class="gm-xp-fill" style="width:78%"></div></div><div class="gm-sidebar-xp" style="margin-top:4px">660 XP to Level 9</div></div></div>
  <div class="right"><div class="page-hdr"><h1>Habits</h1><div class="page-hdr-actions"><button class="btn-primary" onclick="window.location.href='habit-new.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Habit</button></div></div><div class="filter-tabs"><button class="ftab" @click="filter='all'" :class="{active:filter==='all'}">All</button><button class="ftab" @click="filter='boolean'" :class="{active:filter==='boolean'}">Simple</button><button class="ftab" @click="filter='quantitative'" :class="{active:filter==='quantitative'}">Progressive</button></div><div x-show="view==='loading'" style="text-align:center;padding:2rem;color:var(--tx3);font-size:13px">Loading habits…</div>
<div x-show="view==='error'" style="text-align:center;padding:2rem;color:var(--dn);font-size:13px" x-text="'Error: '+error"></div>
<div x-show="view==='empty'" style="text-align:center;padding:3rem 1rem"><div style="font-size:32px;margin-bottom:12px">&#10003;</div><div style="font-size:14px;font-weight:600;color:var(--tx);margin-bottom:6px">No habits yet</div><div style="font-size:12px;color:var(--tx3);margin-bottom:20px">Start tracking your daily routines</div><button class="btn-primary" onclick="window.location.href='habit-new.html'">Create your first habit</button></div>
<div id="habit-list" x-show="view==='list'"><template x-for="h in filtered" :key="h.id"><div class="habit-card" :class="{done:h.done}" :style="'--hm-color:'+h.color" @click="toggleDone(h)"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:12px;font-weight:700;color:var(--tx)" x-text="h.name"></div><div style="font-size:10px;color:var(--tx3);margin-top:2px" x-text="h.freq"></div></div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:var(--tx3)">&#128293; <span x-text="h.streak"></span>d</span><div x-show="h.type==='boolean'" style="width:16px;height:16px;border-radius:50%;border:1.5px solid var(--hm-color,var(--ac))" :style="h.done?'background:var(--hm-color,var(--ac))':''"></div></div></div><div class="hm-tabs" @click.stop><button class="hmtab" @click="h.hmView='week'" :class="{active:h.hmView==='week'}">W</button><button class="hmtab" @click="h.hmView='month'" :class="{active:h.hmView==='month'}">M</button><button class="hmtab" @click="h.hmView='year'" :class="{active:h.hmView==='year'}">Y</button></div><div class="hm-mini"><template x-for="(level,i) in generateHeatmap(h,h.hmView)" :key="i"><div class="hm-cell" :class="level>0?'l'+level:''"></div></template></div><div class="goal-bar-wrap" x-show="h.type==='boolean'"><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--tx3);margin-bottom:3px"><span>This week</span><span x-text="h.weekDone+'/'+h.weekGoal"></span></div><div class="goal-bar-bg"><div class="goal-bar-fill" :style="{width:(h.weekDone/h.weekGoal*100)+'%'}"></div></div></div><div class="goal-bar-wrap" x-show="h.type==='quantitative'"><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--tx3);margin-bottom:3px"><span>Today</span><span x-text="h.todayAmt+'/'+h.goal"></span></div><div class="goal-bar-bg"><div class="goal-bar-fill" :style="{width:(Math.min(h.todayAmt/h.goal,1)*100)+'%'}"></div></div></div></div></template></div></div></div><nav class="bnav"><div class="bnav-inner"><a href="index.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"></svg><span>Home</span></a><a href="habits.html" class="bnav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"></svg><span>Habits</span></a><a href="tasks.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"></svg><span>Tasks</span></a><a href="maintenance.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"></svg><span>Maint.</span></a><div class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg><span>More</span></div></div></nav>
  <script>
  function pageApp() {
    return {
      filter: 'all',
      loading: false,
      error: null,
      habits: [
        { id:1, name:'Drink 2.5L Water',   type:'quantitative', freq:'Daily',      color:'#378ADD', streak:4,  done:false, weekDone:4, weekGoal:7, rate:65, todayAmt:1.2,  goal:2.5,  uom:'L',     hmView:'week' },
        { id:2, name:'Morning Prayers',     type:'boolean',      freq:'Daily',      color:'#EF9F27', streak:12, done:true,  weekDone:6, weekGoal:7, rate:85, todayAmt:0,    goal:0,    uom:'',      hmView:'week' },
        { id:3, name:'Workout',             type:'boolean',      freq:'Daily',      color:'#1D9E75', streak:5,  done:false, weekDone:3, weekGoal:5, rate:70, todayAmt:0,    goal:0,    uom:'',      hmView:'week' },
        { id:4, name:'Study 1h',            type:'quantitative', freq:'Daily',      color:'#7F77DD', streak:8,  done:false, weekDone:5, weekGoal:7, rate:72, todayAmt:0,    goal:60,   uom:'min',   hmView:'week' },
        { id:5, name:'Walk 6k Steps',       type:'quantitative', freq:'Daily',      color:'#5BC4C4', streak:3,  done:false, weekDone:3, weekGoal:7, rate:55, todayAmt:2400, goal:6000, uom:'steps', hmView:'week' },
        { id:6, name:'Evening Prayers',     type:'boolean',      freq:'Daily',      color:'#C77DD3', streak:9,  done:false, weekDone:4, weekGoal:7, rate:78, todayAmt:0,    goal:0,    uom:'',      hmView:'week' },
        { id:7, name:'Go to Bed Early',     type:'boolean',      freq:'Daily',      color:'#E07B54', streak:2,  done:false, weekDone:3, weekGoal:7, rate:48, todayAmt:0,    goal:0,    uom:'',      hmView:'week' },
      ],

      async init() {
        try {
          const res = await fetch('/api/habits');
          if (!res.ok) return;
          const data = await res.json();
          if (data && data.length) {
            this.habits = data.map(h => ({
              ...h,
              type: h.type === 'quant' ? 'quantitative' : 'boolean',
              rate: h.pct,
              todayAmt: h.qty,
              goal: h.target,
              uom: h.unit,
              hmView: h.hmView || 'week',
            }));
          }
        } catch (e) {
          // keep sample data
        }
      },

      get view() {
        if (this.loading) return 'loading';
        if (this.error) return 'error';
        if (this.habits.length === 0) return 'empty';
        return 'list';
      },

      get filtered() {
        if (this.filter === 'all') return this.habits;
        return this.habits.filter(h => h.type === this.filter);
      },

      generateHeatmap(habit, view) {
        var cells = 28, rate = (habit.rate || 50) / 100, result = [], seed = habit.id * 137;
        function rand() { seed=(seed*1664525+1013904223)&0xffffffff; return Math.abs(seed)/2147483647; }
        for (var i = 0; i < cells; i++) {
          var r = rand();
          if (view === 'week') {
            result.push((i%7) >= (7-(habit.weekDone||0)) ? 4 : (r<0.3?0:1));
          } else {
            if (r<rate*0.7) result.push(4);
            else if (r<rate*0.85) result.push(3);
            else if (r<rate) result.push(2);
            else if (r<rate+0.1) result.push(1);
            else result.push(0);
          }
        }
        return result;
      },

      async toggleDone(h) {
        if (h.type === 'boolean') {
          h.done = !h.done;
          if (h.done) { h.streak = (h.streak||0) + 1; h.weekDone = Math.min((h.weekDone||0)+1, h.weekGoal); }
          else { h.streak = Math.max((h.streak||1) - 1, 0); h.weekDone = Math.max((h.weekDone||1)-1, 0); }
          try {
            const res = await fetch(`/api/habits/${h.id}/toggle`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ amount: null }),
            });
            if (res.ok) {
              const updated = await res.json();
              h.streak = updated.streak;
              h.rate = updated.pct;
              h.weekDone = updated.weekDone;
            }
          } catch (e) { /* offline — local toggle kept */ }
        }
      }
    }
  }
  </script>
