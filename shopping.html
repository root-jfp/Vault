<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault &#8212; Shopping List</title>
<link rel="stylesheet" href="vault-core.css">
<link rel="stylesheet" href="vault-modal.css">
<link rel="stylesheet" href="vault-gamification.css">
<link rel="stylesheet" href="vault-mobile.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={corePlugins:{preflight:false}}</script>
<style>
[x-cloak]{display:none!important}
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ftab{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);cursor:pointer;transition:all .15s}
.ftab.active{background:var(--acbg);color:var(--actx);border-color:var(--ac)}
.ftab:hover:not(.active){background:var(--bg3);color:var(--tx)}
.shop-cat-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin:16px 0 6px;display:flex;align-items:center;gap:6px}
.shop-item{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--cardb);border-radius:8px;padding:10px 12px;margin-bottom:5px;cursor:pointer;transition:border-color .15s}
.shop-item:hover{border-color:var(--tx3)}
.shop-item.done{opacity:.5}
.shop-item.done .shop-name{text-decoration:line-through;color:var(--tx3)}
.shop-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.shop-check.done{background:var(--ac);border-color:var(--ac)}
.shop-name{font-size:12px;font-weight:600;flex:1}
.shop-qty{font-size:10px;color:var(--tx3);background:var(--bg3);padding:2px 7px;border-radius:4px}
.shop-recurring{font-size:9px;color:var(--wntx);background:var(--wnbg);padding:1px 5px;border-radius:3px}
.summary-bar-wrap{background:var(--card);border:1px solid var(--cardb);border-radius:8px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.summary-bar-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.summary-bar-fill{height:100%;background:var(--ac);border-radius:3px;transition:width .3s}
.summary-label{font-size:11px;font-weight:600;color:var(--tx2);white-space:nowrap}
</style>
<!-- nova-bridge -->
<link rel="stylesheet" href="nova-bridge.css">
<script src="nova-bridge.js" defer></script>
</head>
<body x-data="pageApp()" x-cloak>

  <div class="topbar">
    <div class="topbar-title">Vault</div>
    <div class="topbar-right">
      <a href="index.html" class="topbar-user" style="text-decoration:none">
        <div class="gm-level-badge sm">8</div>
        <div class="topbar-av" style="background:var(--ac)">J</div>Jos&#233;
      </a>
      <button class="topbar-cog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="17" height="17"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>

  <div class="layout">

    <aside class="lnav">
      <div class="lnav-block">
        <a href="index.html" class="lnav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="habits.html" class="lnav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          Habits
        </a>
        <a href="tasks.html" class="lnav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Tasks
        </a>
        <a href="projects.html" class="lnav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Projects
        </a>
        <a href="maintenance.html" class="lnav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          Maintenance
        </a>
        <a href="calendar.html" class="lnav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendar
        </a>
        <a href="performance.html" class="lnav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M12 20V10M6 20V4M18 20v-6"/></svg>
          Performance
        </a>
        <a href="notes.html" class="lnav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Notes
        </a>
        <a href="shopping.html" class="lnav-item active" style="color:var(--actx)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Shopping
        </a>
        <a href="budget.html" class="lnav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><circle cx="12" cy="12" r="10"/><path d="M9 11.5c0-1.657 1.343-3 3-3s3 1.343 3 3c0 1.5-2 2.5-3 3.5"/><line x1="12" y1="8" x2="12" y2="8.5"/><line x1="12" y1="16" x2="12" y2="16.5"/></svg>
          Budget
        </a>
      </div>

      <div class="gm-sidebar-widget">
        <div class="gm-sw-header">
          <div class="gm-level-badge">8</div>
          <div>
            <div style="font-size:11px;font-weight:600">Level 8 &middot; Consistent</div>
            <div style="font-size:9px;color:var(--tx3)">2,340 / 3,000 XP</div>
          </div>
        </div>
        <div class="gm-xp-bar"><div class="gm-xp-fill" style="width:78%"></div></div>
        <div style="font-size:9px;color:var(--tx3);margin-top:4px">660 XP to Level 9</div>
      </div>
    </aside>

    <main class="main-content">

      <div class="page-header">
        <div>
          <h1 class="page-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="20" height="20" style="vertical-align:-3px;margin-right:6px"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Shopping List
          </h1>
          <div class="page-sub">Household shopping &mdash; Apr 2026</div>
        </div>
        <div class="page-actions">
          <button class="btn-primary" @click="openAddItemModal()">+ Add Item</button>
        </div>
      </div>

      <!-- Summary bar -->
      <div class="summary-bar-wrap">
        <span class="summary-label" x-text="`${doneItems} / ${totalItems} items checked`"></span>
        <div class="summary-bar-track">
          <div class="summary-bar-fill" :style="`width:${totalItems ? (doneItems/totalItems*100) : 0}%`"></div>
        </div>
        <span style="font-size:10px;color:var(--tx3);white-space:nowrap" x-text="`${totalItems ? Math.round(doneItems/totalItems*100) : 0}%`"></span>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs">
        <button class="ftab" :class="{active:filter==='all'}"        @click="filter='all'">All</button>
        <button class="ftab" :class="{active:filter==='Groceries'}"  @click="filter='Groceries'">Groceries</button>
        <button class="ftab" :class="{active:filter==='Household'}"  @click="filter='Household'">Household</button>
        <button class="ftab" :class="{active:filter==='Other'}"      @click="filter='Other'">Other</button>
        <button class="ftab" :class="{active:filter==='done'}"       @click="filter='done'">&#10003; Done</button>
      </div>

      <!-- Item list grouped by category -->
      <template x-for="cat in filtered" :key="cat.id">
        <div>
          <div class="shop-cat-hdr">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="11" height="11"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span x-text="cat.name"></span>
            <span style="font-size:9px;background:var(--bg3);padding:1px 6px;border-radius:3px;margin-left:2px" x-text="`${cat.items.filter(i=>i.done).length}/${cat.items.length}`"></span>
          </div>
          <template x-for="item in cat.items" :key="item.id">
            <div class="shop-item" :class="{done:item.done}" @click="openItemModal(item)">
              <div class="shop-check" :class="{done:item.done}" @click.stop="item.done=!item.done">
                <template x-if="item.done">
                  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg>
                </template>
              </div>
              <span class="shop-name" x-text="item.name"></span>
              <span class="shop-qty" x-text="item.qty"></span>
              <span class="shop-recurring" x-show="item.recurring">&#9851; recurring</span>
            </div>
          </template>
        </div>
      </template>

      <div x-show="filtered.length===0" style="text-align:center;color:var(--tx3);font-size:12px;padding:32px 0">
        No items in this view.
      </div>

    </main>
  </div>

  <nav class="bnav">
    <div class="bnav-inner">
      <a href="index.html" class="bnav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>Home</span>
      </a>
      <a href="habits.html" class="bnav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span>Habits</span>
      </a>
      <a href="tasks.html" class="bnav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span>Tasks</span>
      </a>
      <a href="maintenance.html" class="bnav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        <span>Maint.</span>
      </a>
      <div class="bnav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        <span>More</span>
      </div>
    </div>
  </nav>

  <!-- Modal -->
  <div class="vm-overlay" id="vault-modal" @click.self="closeModal()">
    <div class="vm-dialog">
      <div class="vm-header">
        <div class="vm-hdot" id="vm-dot"></div>
        <div class="vm-hgroup">
          <div class="vm-htitle" id="vm-title"></div>
          <div class="vm-hsub" id="vm-sub"></div>
        </div>
        <button class="vm-close" @click="closeModal()">&times;</button>
      </div>
      <div class="vm-body" id="vm-body"></div>
      <div class="vm-footer" id="vm-footer"></div>
    </div>
  </div>

  <script>
  function pageApp() {
    return {
      filter: 'all',
      loading: true,
      error: null,
      lists: [],
      activeListId: null,
      items: [],

      // Flat items grouped by category for display
      get categories() {
        const groups = {};
        for (const item of this.items) {
          const cat = item.category || 'Other';
          if (!groups[cat]) groups[cat] = { id: cat, name: cat, items: [] };
          groups[cat].items.push(item);
        }
        return Object.values(groups);
      },

      get filtered() {
        if (this.filter === 'done') {
          return this.categories.map(c => ({ ...c, items: c.items.filter(i => i.done) })).filter(c => c.items.length);
        }
        if (this.filter !== 'all') {
          return this.categories.filter(c => c.name === this.filter);
        }
        return this.categories;
      },

      get totalItems() { return this.items.length; },
      get doneItems() { return this.items.filter(i => i.done).length; },

      async init() {
        document.addEventListener('keydown', e => { if (e.key === 'Escape') this.closeModal(); });
        await this.fetchLists();
      },

      async fetchLists() {
        this.loading = true;
        this.error = null;
        try {
          const res = await fetch('/api/shopping');
          if (!res.ok) throw new Error('Failed to load lists: ' + res.status);
          const data = await res.json();
          this.lists = data;
          if (data.length > 0) {
            this.activeListId = data[0].Id;
            await this.fetchItems(this.activeListId);
          }
        } catch (err) {
          this.error = err.message;
          console.error('[shopping] fetchLists:', err);
          this.loading = false;
        }
      },

      async fetchItems(listId) {
        this.loading = true;
        try {
          const res = await fetch('/api/shopping/' + listId);
          if (!res.ok) throw new Error('Failed to load items: ' + res.status);
          const data = await res.json();
          this.items = data.map(i => ({
            id: i.Id, name: i.Name, qty: i.Quantity + (i.Unit ? ' ' + i.Unit : ''),
            quantity: i.Quantity, unit: i.Unit || '',
            category: i.Category || 'Other', done: i.IsDone,
          }));
        } catch (err) {
          this.error = err.message;
          console.error('[shopping] fetchItems:', err);
        } finally {
          this.loading = false;
        }
      },

      async toggleItem(id) {
        const idx = this.items.findIndex(i => i.id === id);
        if (idx === -1) return;
        // Optimistic update
        this.items = [...this.items.slice(0, idx), { ...this.items[idx], done: !this.items[idx].done }, ...this.items.slice(idx + 1)];
        try {
          const res = await fetch('/api/shopping/items/' + id + '/toggle', { method: 'PATCH' });
          if (!res.ok) throw new Error('Failed to toggle item: ' + res.status);
        } catch (err) {
          this.error = err.message;
          console.error('[shopping] toggleItem:', err);
          // Revert
          this.items = [...this.items.slice(0, idx), { ...this.items[idx], done: !this.items[idx].done }, ...this.items.slice(idx + 1)];
        }
      },

      async addItem(name, quantity, unit, category) {
        if (!this.activeListId) return;
        try {
          const res = await fetch('/api/shopping/' + this.activeListId + '/items', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, quantity: quantity || 1, unit: unit || '', category: category || 'Other' }),
          });
          if (!res.ok) throw new Error('Failed to add item: ' + res.status);
          this.closeModal();
          await this.fetchItems(this.activeListId);
        } catch (err) {
          this.error = err.message;
          console.error('[shopping] addItem:', err);
        }
      },

      async deleteItem(id) {
        if (!confirm('Remove this item?')) return;
        try {
          const res = await fetch('/api/shopping/items/' + id, { method: 'DELETE' });
          if (!res.ok) throw new Error('Failed to delete item: ' + res.status);
          this.closeModal();
          await this.fetchItems(this.activeListId);
        } catch (err) {
          this.error = err.message;
          console.error('[shopping] deleteItem:', err);
        }
      },

      async clearDone() {
        if (!this.activeListId) return;
        try {
          const res = await fetch('/api/shopping/' + this.activeListId + '/done', { method: 'DELETE' });
          if (!res.ok) throw new Error('Failed to clear done items: ' + res.status);
          await this.fetchItems(this.activeListId);
        } catch (err) {
          this.error = err.message;
          console.error('[shopping] clearDone:', err);
        }
      },
            openModal({ title, sub, color, body, footer }) {
        document.getElementById('vm-dot').style.background  = color  || 'var(--tx3)';
        document.getElementById('vm-title').textContent     = title  || '';
        document.getElementById('vm-sub').textContent       = sub    || '';
        document.getElementById('vm-body').innerHTML        = body   || '';
        document.getElementById('vm-footer').innerHTML      = footer || '';
        document.getElementById('vault-modal').classList.add('open');
      },

      closeModal() {
        document.getElementById('vault-modal').classList.remove('open');
      },

      openItemModal(item) {
        const body = `
          <div class="vm-section"><div class="vm-row">
            <div class="vm-col"><div class="vm-label">Quantity</div><div class="vm-value" style="font-size:18px;font-weight:700">${item.qty}</div></div>
            <div class="vm-col"><div class="vm-label">Category</div><div class="vm-value">${item.cat}</div></div>
          </div></div>
          <div class="vm-section"><div class="vm-label">Recurring item</div><div class="vm-value">${item.recurring ? 'Yes \u2014 added automatically each week' : 'No'}</div></div>
          <div class="vm-section"><div class="vm-label">Status</div><div class="vm-value" style="color:${item.done ? 'var(--actx)' : 'var(--tx2)'}">${item.done ? '\u2713 In cart' : 'Pending'}</div></div>`;

        const footer = `
          <button class="vm-btn danger" onclick="document.getElementById('vault-modal').classList.remove('open')">Remove</button>
          <button class="vm-btn" onclick="document.getElementById('vault-modal').classList.remove('open')">Edit</button>
          <button class="vm-btn primary" onclick="document.getElementById('vault-modal').classList.remove('open')">Done \u2713</button>`;

        this.openModal({
          title: item.name,
          sub: 'Shopping item \u00b7 ' + item.cat,
          color: item.done ? 'var(--ac)' : 'var(--tx3)',
          body,
          footer,
        });
      },

      openAddItemModal() {
        const catOptions = this.categories.map(c =>
          `<option value="${c.name}">${c.name}</option>`
        ).join('');

        const body = `
          <div class="vm-section">
            <div class="vm-label">Item name</div>
            <input id="ai-name" type="text" placeholder="e.g. Azeite"
              style="width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:12px;outline:none;box-sizing:border-box"/>
          </div>
          <div class="vm-section">
            <div class="vm-row">
              <div class="vm-col">
                <div class="vm-label">Quantity</div>
                <input id="ai-qty" type="text" placeholder="e.g. 1x"
                  style="width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:12px;outline:none;box-sizing:border-box"/>
              </div>
              <div class="vm-col">
                <div class="vm-label">Category</div>
                <select id="ai-cat"
                  style="width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:12px;outline:none;box-sizing:border-box">
                  ${catOptions}
                </select>
              </div>
            </div>
          </div>
          <div class="vm-section">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--tx2)">
              <input id="ai-recurring" type="checkbox"
                style="width:14px;height:14px;accent-color:var(--ac);cursor:pointer"/>
              Recurring item (auto-add each week)
            </label>
          </div>`;

        const footer = `
          <button class="vm-btn" onclick="document.getElementById('vault-modal').classList.remove('open')">Cancel</button>
          <button class="vm-btn primary" onclick="document.getElementById('vault-modal').classList.remove('open')">Add Item</button>`;

        this.openModal({ title: 'Add Item', sub: 'New shopping item', color: 'var(--ac)', body, footer });
      },

    };
  }
  </script>
