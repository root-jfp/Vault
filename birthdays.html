<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault &#8212; Birthdays</title>
<link rel="stylesheet" href="vault-core.css">
<link rel="stylesheet" href="vault-modal.css">
<link rel="stylesheet" href="vault-gamification.css">
<link rel="stylesheet" href="vault-mobile.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={corePlugins:{preflight:false}}</script>
<style>
.person-card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:12px}
.person-card:hover{border-color:var(--tx3)}
.person-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.person-info{flex:1;min-width:0}
.person-name{font-size:13px;font-weight:700;color:var(--tx)}
.person-date{font-size:10px;color:var(--tx3);margin-top:1px}
.person-right{text-align:right;flex-shrink:0}
.days-badge{font-size:11px;font-weight:700;color:var(--actx)}
.cat-tag{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:600;margin-top:3px;display:inline-block}
.cat-tag.family{background:var(--wnbg);color:var(--wntx)}
.cat-tag.friends{background:var(--infbg);color:var(--inftx)}
.cat-tag.anniversary{background:var(--pubg);color:var(--putx)}
.upcoming-section{margin-bottom:18px}
.upcoming-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ucard{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s}
.ucard:hover{border-color:var(--tx3)}
.ucard-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;margin-bottom:7px}
.ucard-name{font-size:12px;font-weight:700;color:var(--tx)}
.ucard-sub{font-size:10px;color:var(--tx3);margin-top:2px}
.ucard-days{font-size:13px;font-weight:700;color:var(--actx);margin-top:5px}
.people-list{display:flex;flex-direction:column;gap:7px}
.mini-cal{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px}
.mc-header{font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mc-day-hdr{font-size:8px;color:var(--tx3);text-align:center;padding:2px 0;font-weight:600}
.mc-cell{font-size:9px;text-align:center;padding:3px 1px;border-radius:3px;position:relative;color:var(--tx3)}
.mc-cell.today{background:var(--acbg);color:var(--actx);font-weight:700}
.mc-cell.has-event{color:var(--tx);font-weight:600}
.mc-dot{width:4px;height:4px;border-radius:50%;background:var(--ac);margin:1px auto 0}
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ftab{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);cursor:pointer}
.ftab.active{background:var(--acbg);color:var(--actx);border-color:var(--ac)}
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);margin-bottom:8px}
[x-cloak]{display:none!important}
</style>
</head>
<body x-data="pageApp()" x-cloak>

<div class="topbar">
  <div class="topbar-title">Vault</div>
  <div class="topbar-right">
    <a href="index.html" class="topbar-user" style="text-decoration:none">
      <div class="gm-level-badge sm">8</div>
      <div class="topbar-av" style="background:var(--ac)">J</div>
      Jos&#233;
    </a>
    <button class="topbar-cog">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="17" height="17"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<div class="layout">
  <aside class="lnav">
    <div class="lnav-block">
      <a href="index.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="habits.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Habits</a>
      <a href="maintenance.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Maintenance</a>
      <a href="tasks.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Tasks</a>
      <a href="projects.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Projects</a>
      <a href="vault_calendar.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendar</a>
      <a href="birthdays.html" class="lnav-item active" style="color:var(--actx)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Birthdays</a>
    </div>
    <div class="gm-sidebar-widget">
      <div class="gm-sw-header">
        <div class="gm-level-badge">8</div>
        <div>
          <div style="font-size:11px;font-weight:600">Level 8 &#183; Consistent</div>
          <div style="font-size:9px;color:var(--tx3)">2,340 / 3,000 XP</div>
        </div>
      </div>
      <div class="gm-xp-bar"><div class="gm-xp-fill" style="width:78%"></div></div>
      <div style="font-size:9px;color:var(--tx3);margin-top:4px">660 XP to Level 9</div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="16" height="16"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
          Birthdays &amp; Anniversaries
        </h1>
        <div class="page-sub">Stay on top of the people you love</div>
      </div>
      <div class="page-actions">
        <button class="btn-primary" style="display:flex;align-items:center;gap:5px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Person
        </button>
      </div>
    </div>

    <!-- Coming Up Section -->
    <div class="upcoming-section">
      <div class="sec-label">Coming up</div>
      <div class="upcoming-cards">
        <template x-for="p in upcomingThree" :key="p.id">
          <div class="ucard" @click="openPersonModal(p)">
            <div class="ucard-av" :style="'background:'+p.color" x-text="p.initial"></div>
            <div class="ucard-name" x-text="p.name"></div>
            <div class="ucard-sub" x-text="formatDateShort(p.date) + (p.type==='birthday' ? ' · turns '+nextAge(p.date) : '')"></div>
            <div class="ucard-days" x-text="'in '+daysUntil(p.date)+' days'"></div>
          </div>
        </template>
      </div>
    </div>

    <!-- Mini Calendar -->
    <div class="mini-cal" style="margin-bottom:18px">
      <div class="mc-header">
        <span x-text="currentMonthName+' '+currentYear"></span>
        <span style="font-size:9px;color:var(--tx3)" x-text="eventDaysThisMonth.length+' event(s) this month'"></span>
      </div>
      <div class="mc-grid">
        <template x-for="d in ['M','T','W','T','F','S','S']" :key="d+'hdr'"><div class="mc-day-hdr" x-text="d"></div></template>
        <template x-for="cell in calendarCells" :key="cell.key">
          <div class="mc-cell" :class="cell.today?'today':(cell.hasEvent?'has-event':'')">
            <span x-text="cell.day||''"></span>
            <div class="mc-dot" x-show="cell.hasEvent"></div>
          </div>
        </template>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="ftab" @click="filter='all'" :class="{active:filter==='all'}">All</button>
      <button class="ftab" @click="filter='thismonth'" :class="{active:filter==='thismonth'}">This Month</button>
      <button class="ftab" @click="filter='family'" :class="{active:filter==='family'}">Family</button>
      <button class="ftab" @click="filter='friends'" :class="{active:filter==='friends'}">Friends</button>
      <button class="ftab" @click="filter='anniversary'" :class="{active:filter==='anniversary'}">Anniversary</button>
    </div>

    <!-- People List -->
    <div class="people-list">
      <template x-for="p in filtered" :key="p.id">
        <div class="person-card" @click="openPersonModal(p)">
          <div class="person-av" :style="'background:'+p.color" x-text="p.initial"></div>
          <div class="person-info">
            <div class="person-name" x-text="p.name + (p.note ? ' · ' + p.note : '')"></div>
            <div class="person-date" x-text="formatDateFull(p.date) + (p.type==='birthday' ? ' · turns '+nextAge(p.date) : ' · '+yearsTogether(p.date)+' yrs')"></div>
          </div>
          <div class="person-right">
            <div class="days-badge" x-text="daysUntil(p.date)===0 ? 'Today!' : 'in '+daysUntil(p.date)+'d'"></div>
            <div :class="'cat-tag '+p.cat.toLowerCase()" x-text="p.cat"></div>
          </div>
        </div>
      </template>
    </div>
  </main>
</div>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>

<!-- Modal -->
<div class="vm-overlay" :class="{open:modal.open}" @click.self="closeModal()">
  <div class="vm-dialog">
    <div class="vm-header">
      <div class="vm-hdot" :style="'background:'+modal.color"></div>
      <div class="vm-hgroup">
        <div class="vm-htitle" x-text="modal.title"></div>
        <div class="vm-hsub" x-text="modal.sub"></div>
      </div>
      <button class="vm-close" @click="closeModal()">&#x2715;</button>
    </div>
    <div class="vm-body" x-html="modal.body"></div>
    <div class="vm-footer" x-html="modal.footer"></div>
  </div>
</div>

<script>
function h(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pageApp() {
  return {
    loading: true,
    filter: "all",
    modal: { open:false, title:"", sub:"", color:"", body:"", footer:"" },
    today: new Date(),
    people: [],
    upcomingPeople: [],

    async init() {
      document.addEventListener("keydown", e => { if (e.key === "Escape") this.closeModal(); });
      await this.fetchData();
    },

    async fetchData() {
      this.loading = true;
      try {
        const [allRes, upcomingRes] = await Promise.all([
          fetch("/api/birthdays"),
          fetch("/api/birthdays/upcoming?days=30")
        ]);
        if (!allRes.ok) throw new Error("Failed to fetch birthdays: " + allRes.status);
        if (!upcomingRes.ok) throw new Error("Failed to fetch upcoming: " + upcomingRes.status);
        const allData = await allRes.json();
        const upcomingData = await upcomingRes.json();
        this.people = Array.isArray(allData) ? allData : (allData.data || []);
        this.upcomingPeople = Array.isArray(upcomingData) ? upcomingData : (upcomingData.data || []);
      } catch (err) {
        console.error("Error fetching birthdays:", err);
        this.people = [];
        this.upcomingPeople = [];
      } finally {
        this.loading = false;
      }
    },

    daysUntil(person) {
      if (person.DaysUntil != null) return person.DaysUntil;
      var t = this.today;
      var d = new Date(person.Date || person.date);
      var next = new Date(t.getFullYear(), d.getMonth(), d.getDate());
      if (next < t) next = new Date(t.getFullYear()+1, d.getMonth(), d.getDate());
      return Math.round((next - t) / 86400000);
    },

    nextAge(person) {
      if (person.NextAge != null) return person.NextAge;
      var t = this.today;
      var d = new Date(person.Date || person.date);
      var age = t.getFullYear() - d.getFullYear();
      var hasPassed = (t.getMonth() > d.getMonth()) || (t.getMonth()===d.getMonth() && t.getDate() >= d.getDate());
      return hasPassed ? age+1 : age;
    },

    yearsTogether(person) {
      if (person.YearsTogether != null) return person.YearsTogether;
      var t = this.today;
      var d = new Date(person.Date || person.date);
      return t.getFullYear() - d.getFullYear();
    },

    formatDateShort(dateStr) {
      var d = new Date(dateStr);
      return d.toLocaleDateString("en-GB", {day:"numeric", month:"short"});
    },

    formatDateFull(dateStr) {
      var d = new Date(dateStr);
      return d.toLocaleDateString("en-GB", {day:"numeric", month:"long"});
    },

    get upcomingThree() {
      var src = this.upcomingPeople.length ? this.upcomingPeople : this.people;
      return [...src]
        .sort((a,b) => this.daysUntil(a) - this.daysUntil(b))
        .slice(0,3);
    },

    get filtered() {
      var t = this.today;
      return [...this.people]
        .filter(p => {
          var type = (p.EventType || p.type || "").toLowerCase();
          var cat  = (p.Category  || p.cat  || "").toLowerCase();
          var date = new Date(p.Date || p.date);
          if (this.filter==="all") return true;
          if (this.filter==="thismonth") return date.getMonth()===t.getMonth();
          if (this.filter==="anniversary") return type==="anniversary";
          return cat===this.filter;
        })
        .sort((a,b) => this.daysUntil(a) - this.daysUntil(b));
    },

    get currentMonthName() {
      return this.today.toLocaleDateString("en-GB",{month:"long"});
    },

    get currentYear() { return this.today.getFullYear(); },

    get eventDaysThisMonth() {
      var t = this.today;
      return this.people
        .filter(p => { var d=new Date(p.Date||p.date); return d.getMonth()===t.getMonth(); })
        .map(p => new Date(p.Date||p.date).getDate());
    },

    get calendarCells() {
      var t = this.today;
      var year = t.getFullYear(), month = t.getMonth();
      var firstDay = new Date(year, month, 1).getDay();
      var startOffset = (firstDay+6)%7;
      var daysInMonth = new Date(year, month+1, 0).getDate();
      var cells = [];
      for (var i=0; i<startOffset; i++) cells.push({key:"e"+i, day:"", today:false, hasEvent:false});
      var evDays = this.eventDaysThisMonth;
      for (var d=1; d<=daysInMonth; d++) {
        cells.push({ key:"d"+d, day: d, today: d===t.getDate(), hasEvent: evDays.includes(d) });
      }
      return cells;
    },

    async savePerson(formData) {
      try {
        const res = await fetch("/api/birthdays", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(formData)
        });
        if (!res.ok) throw new Error("Failed to save: " + res.status);
        await this.fetchData();
        this.closeModal();
      } catch (err) { console.error("Error saving person:", err); }
    },

    async updatePerson(id, formData) {
      try {
        const res = await fetch("/api/birthdays/" + id, {
          method: "PUT", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(formData)
        });
        if (!res.ok) throw new Error("Failed to update: " + res.status);
        await this.fetchData();
        this.closeModal();
      } catch (err) { console.error("Error updating person:", err); }
    },

    async deletePerson(id) {
      if (!confirm("Delete this entry?")) return;
      try {
        const res = await fetch("/api/birthdays/" + id, { method: "DELETE" });
        if (!res.ok) throw new Error("Failed to delete: " + res.status);
        await this.fetchData();
        this.closeModal();
      } catch (err) { console.error("Error deleting person:", err); }
    },

    openModal(opts) { this.modal = { open:true, ...opts }; },
    closeModal() { this.modal.open = false; },

    openPersonModal(p) {
      var days = this.daysUntil(p);
      var countdownTxt = days===0 ? "Today!" : "in "+days+" days";
      var isBday = (p.EventType||p.type||"").toLowerCase()==="birthday";
      var color  = p.color || "var(--ac)";
      var ageLine = isBday
        ? "<div class=\"vm-label\">Turns</div><div class=\"vm-value\" style=\"font-size:22px;font-weight:700;color:"+color+"\">"+this.nextAge(p)+"</div>"
        : "<div class=\"vm-label\">Years together</div><div class=\"vm-value\" style=\"font-size:22px;font-weight:700;color:"+color+"\">"+this.yearsTogether(p)+"</div>";
      var note = p.Note || p.note || "";
      var cat  = p.Category || p.cat || "";
      var date = p.Date || p.date || "";
      var pid  = p.Id || p.id;
      var body = "<div class=\"vm-stat-grid\" style=\"margin-bottom:14px\">"
        +"<div class=\"vm-stat-card\"><div class=\"vm-stat-num\" style=\"color:"+color+"\">"+countdownTxt+"</div><div class=\"vm-stat-lbl\">Countdown</div></div>"
        +"<div class=\"vm-stat-card\">"+ageLine+"</div>"
        +"</div>"
        +"<div class=\"vm-row\">"
        +"<div class=\"vm-col\"><div class=\"vm-label\">Date</div><div class=\"vm-value\">"+this.formatDateFull(date)+"</div></div>"
        +"<div class=\"vm-col\"><div class=\"vm-label\">Category</div><div class=\"vm-value\">"+h(cat)+"</div></div>"
        +"</div>"
        +(note ? "<div class=\"vm-divider\"></div><div class=\"vm-label\">Note</div><div class=\"vm-value\">"+h(note)+"</div>" : "")
        +(p.IsMilestone ? "<div class=\"vm-divider\"></div><div class=\"vm-value\" style=\"color:var(--wn)\">★ Milestone!</div>" : "");
      var footer =
        "<button class=\"vm-btn primary\" onclick=\"void(0)\">Set Reminder</button>"
        +"<button class=\"vm-btn\" onclick=\"void(0)\">Edit</button>"
      var footer =
        "<button class=\"vm-btn primary\" onclick=\"void(0)\">Set Reminder</button>"
        +"<button class=\"vm-btn\" onclick=\"void(0)\">Edit</button>"
        +"<button class=\"vm-btn danger\" onclick=\"Alpine.evaluate(document.querySelector(&quot;[x-data]&quot;), &quot;deletePerson("+pid+")&quot;)\" >Delete</button>"
        +"<button class=\"vm-btn\" onclick=\"Alpine.evaluate(document.querySelector(&quot;[x-data]&quot;), &quot;closeModal()&quot;)\" >Close</button>";
      this.openModal({ title: p.Name||p.name, sub: isBday ? "Birthday" : "Anniversary", color: color, body:body, footer:footer });
    },
  }
}

</script>
