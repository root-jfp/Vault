<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault &#8212; Chore Rotation</title>
<link rel="stylesheet" href="vault-core.css">
<link rel="stylesheet" href="vault-modal.css">
<link rel="stylesheet" href="vault-gamification.css">
<link rel="stylesheet" href="vault-mobile.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={corePlugins:{preflight:false}}</script>
<style>
.chore-list{display:flex;flex-direction:column;gap:6px}
.chore-row{display:grid;grid-template-columns:36px 1fr auto auto auto auto;gap:10px;align-items:center;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;transition:border-color .15s,opacity .2s}
.chore-row.done-row{opacity:.55;border-color:var(--acbg)}
.chore-icon{font-size:18px;display:flex;align-items:center;justify-content:center}
.chore-name{font-size:12px;font-weight:700;color:var(--tx)}
.chore-freq{font-size:10px;color:var(--tx3);margin-top:1px}
.chore-day{font-size:10px;color:var(--tx2);white-space:nowrap}
.assignee-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;cursor:default}
.chore-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bd);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chore-check.checked{background:var(--ac);border-color:var(--ac)}
.chore-check svg{display:none;width:10px;height:10px;stroke:#fff}
.chore-check.checked svg{display:block}
.swap-btn{font-size:10px;padding:3px 9px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--tx3);cursor:pointer;white-space:nowrap;transition:all .15s}
.swap-btn:hover{background:var(--bg3);color:var(--tx)}
.score-bar{display:flex;gap:0;background:var(--bg3);border-radius:8px;overflow:hidden;height:28px;margin-bottom:14px}
.score-seg{display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;font-weight:700;transition:flex .3s;overflow:hidden;white-space:nowrap;padding:0 10px}
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.week-label{font-size:13px;font-weight:600;color:var(--tx);flex:1;text-align:center}
.week-arrow{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.week-arrow:hover{background:var(--bg3);color:var(--tx)}
.filter-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ftab{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);cursor:pointer}
.ftab.active{background:var(--acbg);color:var(--actx);border-color:var(--ac)}
.empty-msg{text-align:center;color:var(--tx3);font-size:12px;padding:24px 0}
[x-cloak]{display:none!important}
</style>
<!-- nova-bridge -->
<link rel="stylesheet" href="nova-bridge.css">
<script src="nova-bridge.js" defer></script>
</head>
<body x-data="pageApp()" x-cloak>
  <div class="topbar"><div class="topbar-title">Vault</div><div class="topbar-right"><a href="index.html" class="topbar-user" style="text-decoration:none"><div class="gm-level-badge sm">8</div><div class="topbar-av" style="background:var(--ac)">J</div>Jos&#233;</a><button class="topbar-cog"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="17" height="17"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button></div></div>
  <div class="layout">
    <aside class="lnav">
      <div class="lnav-block">
        <a href="index.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
        <a href="habits.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Habits</a>
        <a href="maintenance.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Maintenance</a>
        <a href="tasks.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Tasks</a>
        <a href="projects.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Projects</a>
        <a href="chore-rotation.html" class="lnav-item active" style="color:var(--actx)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Chores</a>
        <a href="calendar.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendar</a>
        <a href="performance.html" class="lnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15"><path d="M12 20V10M6 20V4M18 20v-6"/></svg>Performance</a>
      </div>
      <div class="gm-sidebar-widget">
        <div class="gm-sw-header"><div class="gm-level-badge">8</div><div><div style="font-size:11px;font-weight:600">Level 8 &#183; Consistent</div><div style="font-size:9px;color:var(--tx3)">2,340 / 3,000 XP</div></div></div>
        <div class="gm-xp-bar"><div class="gm-xp-fill" style="width:78%"></div></div>
        <div style="font-size:9px;color:var(--tx3);margin-top:4px">660 XP to Level 9</div>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Chore Rotation</h1>
          <div class="page-sub">Household chore assignments for Jos&#233; &amp; Maura</div>
        </div>
        <div class="page-actions">
          <button class="btn-primary" style="display:flex;align-items:center;gap:5px" @click="openAddChoreModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Chore</button>
        </div>
      </div>

      <!-- Week navigation -->
      <div class="week-nav">
        <button class="week-arrow" @click="prevWeek()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="week-label" x-text="weekLabel"></div>
        <button class="week-arrow" @click="nextWeek()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>

      <!-- Score bar -->
      <div class="score-bar">
        <div class="score-seg" :style="'flex:'+joseCount+';background:var(--acbg);color:var(--actx)'">
          <span style="width:18px;height:18px;border-radius:50%;background:var(--ac);display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff">J</span>
          <span x-text="'Jos\u00e9 \u00b7 '+joseCount"></span>
        </div>
        <div class="score-seg" :style="'flex:'+mauraCount+';background:var(--pubg);color:var(--putx)'">
          <span style="width:18px;height:18px;border-radius:50%;background:var(--pu);display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff">A</span>
          <span x-text="'Maura \u00b7 '+mauraCount"></span>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs">
        <button class="ftab" @click="filter='all'" :class="{active:filter==='all'}">All</button>
        <button class="ftab" @click="filter='todo'" :class="{active:filter==='todo'}">To Do</button>
        <button class="ftab" @click="filter='done'" :class="{active:filter==='done'}">Done</button>
        <button class="ftab" @click="filter='overdue'" :class="{active:filter==='overdue'}">Overdue</button>
      </div>

      <!-- Chore list -->
      <div class="chore-list">
        <template x-for="c in filtered" :key="c.id">
          <div class="chore-row" :class="c.done?'done-row':''" @click.self="openChoreModal(c)">
            <div class="chore-icon" x-text="c.icon"></div>
            <div @click="openChoreModal(c)" style="cursor:pointer;min-width:0">
              <div class="chore-name" x-text="c.name"></div>
              <div class="chore-freq"><span x-text="c.freq"></span> &middot; <span x-text="c.dueDay"></span></div>
            </div>
            <div class="assignee-av" :style="c.assignee==='Jos\u00e9'?'background:var(--ac)':'background:var(--pu)'" x-text="c.assignee==='Jos\u00e9'?'J':'A'"></div>
            <div class="chore-day" x-text="c.dueDay" style="font-size:10px;color:var(--tx3);min-width:36px;text-align:center"></div>
            <button class="chore-check" :class="c.done?'checked':''" @click.stop="markDone(c.id || c.Id)" title="Toggle done">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button class="swap-btn" @click.stop="swapChore(c.id || c.Id)">Swap</button>
          </div>
        </template>
        <div class="empty-msg" x-show="filtered.length===0">No chores in this category.</div>
      </div>
    </main>
  </div>

  <nav class="bnav"><div class="bnav-inner">
    <a href="index.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Home</span></a>
    <a href="habits.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span>Habits</span></a>
    <a href="tasks.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><span>Tasks</span></a>
    <a href="maintenance.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg><span>Maint.</span></a>
    <div class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="18" height="18"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg><span>More</span></div>
  </div></nav>

  <!-- Modal -->
  <div class="vm-overlay" id="vm-overlay" onclick="if(event.target===this)closeModal()">
    <div class="vm-dialog">
      <div class="vm-header">
        <div class="vm-hdot" id="vm-hdot"></div>
        <div class="vm-hgroup">
          <div class="vm-htitle" id="vm-htitle"></div>
          <div class="vm-hsub" id="vm-hsub"></div>
        </div>
        <button class="vm-close" onclick="closeModal()">&#215;</button>
      </div>
      <div class="vm-body" id="vm-body"></div>
      <div class="vm-footer" id="vm-footer"></div>
    </div>
  </div>

  <script>
  function openModal(cfg) {
    document.getElementById('vm-hdot').style.background = cfg.color || 'var(--ac)';
    document.getElementById('vm-htitle').textContent = cfg.title || '';
    document.getElementById('vm-hsub').textContent = cfg.sub || '';
    document.getElementById('vm-body').innerHTML = cfg.body || '';
    document.getElementById('vm-footer').innerHTML = cfg.footer || '';
    document.getElementById('vm-overlay').classList.add('open');
  }
  function closeModal() {
    document.getElementById('vm-overlay').classList.remove('open');
  }
function h(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pageApp() {
    return {
      loading: true,
      filter: "all",
      weekOffset: 0,
      chores: [],
      joseScore: 0,
      anaScore: 0,
      fairnessPct: 50,

      async init() {
        document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
        await this.fetchData();
      },

      async fetchData() {
        this.loading = true;
        try {
          const week = this._getISOWeek(this.weekOffset);
          const res = await fetch(`/api/chores?week=${week}`);
          if (!res.ok) throw new Error("Failed to fetch chores: " + res.status);
          const data = await res.json();
          const list = Array.isArray(data) ? data : (data.data || data.chores || []);
          this.chores = list.map(c => ({
            ...c,
            id: c.Id || c.id,
            name: c.Name || c.name,
            assignee: c.AssignedTo || c.assignee,
            freq: c.Frequency || c.freq,
            done: c.IsDone ?? c.done ?? false,
            overdue: c.IsOverdue ?? c.overdue ?? false,
            effort: c.EffortPoints || c.effort || 1,
            icon: c.icon || c.Icon || "",
            lastDone: c.lastDone || c.LastDone || "",
            dueDay: c.dueDay || c.DueDay || ""
          }));
          if (data.JoseScore != null) this.joseScore = data.JoseScore;
          if (data.AnaScore != null) this.anaScore = data.AnaScore;
          if (data.FairnessPct != null) this.fairnessPct = data.FairnessPct;
        } catch (err) {
          console.error("Error fetching chores:", err);
          this.chores = [];
        } finally { this.loading = false; }
      },

      get weekLabel() {
        var d = new Date();
        d.setDate(d.getDate() + this.weekOffset * 7);
        return "Week of " + d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
      },

      get joseCount() { return Math.max(1, this.chores.filter(c => (c.assignee||"").toLowerCase().includes("jos")).length); },
      get anaCount()  { return Math.max(1, this.chores.filter(c => (c.assignee||"").toLowerCase().includes("ana") || (c.assignee||"").toLowerCase().includes("maura")).length); },

      get filtered() {
        if (this.filter==="all")     return this.chores;
        if (this.filter==="done")    return this.chores.filter(c => c.done);
        if (this.filter==="todo")    return this.chores.filter(c => !c.done && !c.overdue);
        if (this.filter==="overdue") return this.chores.filter(c => c.overdue);
        return this.chores;
      },

      _getISOWeek(offset) {
        const d = new Date();
        d.setDate(d.getDate() + (offset * 7));
        const jan4 = new Date(d.getFullYear(), 0, 4);
        const weekNum = Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
        return d.getFullYear() + '-W' + String(weekNum).padStart(2, '0');
      },

            prevWeek() { this.weekOffset--; this.fetchData(); },
      nextWeek() { this.weekOffset++; this.fetchData(); },

      async markDone(id) {
        try {
          const res = await fetch("/api/chores/" + id + "/complete", { method: "POST" });
          if (!res.ok) throw new Error("Failed to mark done: " + res.status);
          await this.fetchData();
        } catch (err) { console.error("Error marking done:", err); }
      },

      async swapChore(id) {
        try {
          const res = await fetch("/api/chores/" + id + "/swap", { method: "PATCH" });
          if (!res.ok) throw new Error("Failed to swap: " + res.status);
          await this.fetchData();
        } catch (err) { console.error("Error swapping:", err); }
      },

      async saveChore(formData) {
        try {
          const res = await fetch("/api/chores", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData)
          });
          if (!res.ok) throw new Error("Failed to save chore: " + res.status);
          await this.fetchData(); closeModal();
        } catch (err) { console.error("Error saving chore:", err); }
      },

      async updateChore(id, formData) {
        try {
          const res = await fetch("/api/chores/" + id, {
            method: "PUT", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData)
          });
          if (!res.ok) throw new Error("Failed to update chore: " + res.status);
          await this.fetchData(); closeModal();
        } catch (err) { console.error("Error updating chore:", err); }
      },

      async deleteChore(id) {
        if (!confirm("Delete this chore?")) return;
        try {
          const res = await fetch("/api/chores/" + id, { method: "DELETE" });
          if (!res.ok) throw new Error("Failed to delete chore: " + res.status);
          await this.fetchData(); closeModal();
        } catch (err) { console.error("Error deleting chore:", err); }
      },

      openChoreModal(chore) {
        var color = (chore.assignee||"").toLowerCase().includes("jos") ? "var(--ac)" : "var(--pu)";
        var avBg = color;
        var avLetter = (chore.assignee||"").toLowerCase().includes("jos") ? "J" : "A";
        var doneBadge = chore.done
          ? "<span class=\"vm-tag\" style=\"background:var(--acbg);color:var(--actx)\">Done</span>"
          : chore.overdue
            ? "<span class=\"vm-tag\" style=\"background:var(--dnbg);color:var(--dntx)\">Overdue</span>"
            : "<span class=\"vm-tag\" style=\"background:var(--bg3);color:var(--tx3)\">Pending</span>";
        var body = "<div class=\"vm-stat-grid\" style=\"margin-bottom:14px\">"
          + "<div class=\"vm-stat-card\"><div class=\"vm-stat-num\" style=\"font-size:14px\">" + h(chore.freq||"") + "</div><div class=\"vm-stat-lbl\">Frequency</div></div>"
          + "<div class=\"vm-stat-card\"><div class=\"vm-stat-num\" style=\"font-size:14px\">" + (chore.effort||1) + " pts</div><div class=\"vm-stat-lbl\">Effort</div></div>"
          + "</div>"
          + "<div class=\"vm-section\"><div class=\"vm-label\">Assigned to</div>"
          + "<div style=\"display:flex;align-items:center;gap:8px;margin-top:4px\">"
          + "<div style=\"width:28px;height:28px;border-radius:50%;background:" + avBg + ";display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700\">" + avLetter + "</div>"
          + "<span class=\"vm-value\" style=\"font-weight:600\">" + h(chore.assignee||"") + "</span></div></div>"
          + "<div class=\"vm-divider\"></div>"
          + "<div class=\"vm-section\"><div class=\"vm-label\">Status</div><div style=\"margin-top:4px\">" + doneBadge + "</div></div>"
          + "<div class=\"vm-section\"><div class=\"vm-label\">Last Completed</div><div class=\"vm-value\">" + h(chore.lastDone || "Unknown") + "</div></div>";
        var id = chore.id || chore.Id;
        var footer = "<button class=\"vm-btn primary\" onclick=\"Alpine.evaluate(document.querySelector(&quot;[x-data]&quot;), &quot;markDone(" + id + ")&quot;)\">" + (chore.done ? "Mark Undone" : "Mark Done") + "</button>"
          + "<button class=\"vm-btn\" onclick=\"Alpine.evaluate(document.querySelector(&quot;[x-data]&quot;), &quot;swapChore(" + id + ")&quot;)\">Swap</button>"
          + "<button class=\"vm-btn danger\" onclick=\"Alpine.evaluate(document.querySelector(&quot;[x-data]&quot;), &quot;deleteChore(" + id + ")&quot;)\">Delete</button>"
          + "<button class=\"vm-btn\" onclick=\"closeModal()\">Close</button>";
        openModal({ title: (chore.icon||"") + " " + chore.name, sub: (chore.assignee||"") + " · " + (chore.freq||""), color: color, body: body, footer: footer });
      },

      openAddChoreModal() {
        var body = "<div class=\"vm-section\"><div class=\"vm-label\">Chore name</div>"
          + "<input class=\"form-input\" id=\"new-chore-name\" placeholder=\"e.g. Limpar janelas\" style=\"margin-top:4px\"></div>"
          + "<div class=\"vm-row\"><div class=\"vm-col\"><div class=\"vm-label\">Assignee</div>"
          + "<select class=\"form-select\" id=\"new-chore-assignee\" style=\"margin-top:4px\"><option>José</option><option>Ana</option></select></div>"
          + "<div class=\"vm-col\"><div class=\"vm-label\">Frequency</div>"
          + "<select class=\"form-select\" id=\"new-chore-freq\" style=\"margin-top:4px\"><option>Daily</option><option>Weekly</option><option>2x week</option><option>3x week</option></select></div></div>"
          + "<div class=\"vm-col\"><div class=\"vm-label\">Effort Points</div>"
          + "<input class=\"form-input\" id=\"new-chore-effort\" type=\"number\" min=\"1\" max=\"10\" value=\"1\" style=\"margin-top:4px\"></div>";
        var footer = "<button class=\"vm-btn primary\" onclick=\"Alpine.evaluate(document.querySelector(&quot;[x-data]&quot;), &quot;saveChore({Name: document.getElementById(\\&quot;new-chore-name\\&quot;).value, AssignedTo: document.getElementById(\\&quot;new-chore-assignee\\&quot;).value, Frequency: document.getElementById(\\&quot;new-chore-freq\\&quot;).value, EffortPoints: +document.getElementById(\\&quot;new-chore-effort\\&quot;).value})&quot;)\">Add Chore</button>"
          + "<button class=\"vm-btn\" onclick=\"closeModal()\">Cancel</button>";
        openModal({ title: "Add Chore", sub: "New household chore", color: "var(--ac)", body: body, footer: footer });
      },
    };
  }
  </script>
<script defer src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</body>
</html>
