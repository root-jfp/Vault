<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Templates</title>
<link rel="stylesheet" href="vault-core.css">
<link rel="stylesheet" href="vault-modal.css">
<link rel="stylesheet" href="vault-gamification.css">
<link rel="stylesheet" href="vault-mobile.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { corePlugins: { preflight: false } }</script>
<style>
.tpl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:900px){.tpl-grid{grid-template-columns:repeat(2,1fr)}}
.tpl-card{background:var(--card);border:1px solid var(--cardb);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .2s,box-shadow .2s;position:relative}
.tpl-card:hover{border-color:var(--ac);box-shadow:0 0 0 2px var(--acbg)}
.tpl-icon{font-size:24px;margin-bottom:8px;line-height:1}
.tpl-name{font-size:12px;font-weight:700;margin-bottom:3px}
.tpl-desc{font-size:10px;color:var(--tx3);line-height:1.4;margin-bottom:8px}
.tpl-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tpl-tag{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:500}
.tpl-use-btn{font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--tx3);cursor:pointer;transition:all .15s;margin-top:8px;width:100%}
.tpl-use-btn:hover{border-color:var(--ac);color:var(--actx);background:var(--acbg)}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:7px 12px;margin-bottom:14px}
.search-bar svg{width:14px;height:14px;color:var(--tx3);flex-shrink:0}
.search-bar input{background:transparent;border:none;outline:none;font-size:12px;color:var(--tx);flex:1;font-family:inherit}
.search-bar input::placeholder{color:var(--tx3)}
.cat-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.cat-tab{font-size:11px;padding:4px 12px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--tx3);cursor:pointer;transition:all .15s}
.cat-tab:hover{background:var(--bg3);color:var(--tx2)}
.cat-tab.active{background:var(--acbg);border-color:var(--ac);color:var(--actx);font-weight:600}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.page-title{font-size:18px;font-weight:700;color:var(--tx)}
.tpl-count{font-size:11px;color:var(--tx3)}
.empty-state{text-align:center;padding:40px 20px;color:var(--tx3);font-size:12px}
</style>
</head>
<body x-data="pageApp()">
  <div class="topbar">
    <div class="topbar-title">Vault</div>
    <div class="topbar-right">
      <a href="index.html" class="topbar-user" style="text-decoration:none">
        <div class="gm-level-badge sm">8</div>
        <div class="topbar-av" style="background:var(--ac)">J</div>José
      </a>
      <button class="topbar-cog"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
  </div>
  <div class="layout">
    <div class="left"><div class="lnav-block"><a href="index.html" class="lnav-item">&#9783; Dashboard</a><a href="habits.html" class="lnav-item">&#10003; Habits</a><a href="maintenance.html" class="lnav-item">&#9874; Maintenance</a><a href="tasks.html" class="lnav-item">&#9783; Tasks</a><a href="projects.html" class="lnav-item">&#9782; Projects</a><a href="calendar.html" class="lnav-item">&#9776; Calendar</a><a href="performance.html" class="lnav-item">&#9650; Performance</a><a href="accountability.html" class="lnav-item">&#9786; Accountability</a><a href="achievements.html" class="lnav-item">&#9733; Achievements</a><a href="templates.html" class="lnav-item active" style="color:var(--actx)">&#9783; Templates</a></div><div class="gm-sidebar-widget" style="margin-top:14px"><div class="gm-sidebar-top"><div class="gm-level-badge">8</div><div class="gm-sidebar-info"><div class="gm-sidebar-level">Level 8 &#183; Consistent</div><div class="gm-sidebar-xp">2,340 / 3,000 XP</div></div></div><div class="gm-xp-bar"><div class="gm-xp-fill" style="width:78%"></div></div><div class="gm-sidebar-xp" style="margin-top:4px">660 XP to Level 9</div></div></div>
  <div class="right">
      <div class="page-hdr">
        <div class="page-title">Templates</div>
        <span class="tpl-count" x-text="filteredTemplates.length+' templates'"></span>
      </div>
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search templates..." x-model="search" autocomplete="off">
      </div>
      <div class="cat-tabs">
        <button class="cat-tab" :class="{active:cat==='all'}" @click="cat='all'">All</button>
        <button class="cat-tab" :class="{active:cat==='habits'}" @click="cat='habits'">Habits</button>
        <button class="cat-tab" :class="{active:cat==='tasks'}" @click="cat='tasks'">Tasks</button>
        <button class="cat-tab" :class="{active:cat==='projects'}" @click="cat='projects'">Projects</button>
        <button class="cat-tab" :class="{active:cat==='maintenance'}" @click="cat='maintenance'">Maintenance</button>
        <button class="cat-tab" :class="{active:cat==='routines'}" @click="cat='routines'">Routines</button>
      </div>
      <div class="tpl-grid" x-show="filteredTemplates.length > 0">
        <template x-for="t in filteredTemplates" :key="t.id">
          <div class="tpl-card">
            <div class="tpl-icon" x-text="t.icon"></div>
            <div class="tpl-name" x-text="t.name"></div>
            <div class="tpl-desc" x-text="t.desc"></div>
            <div class="tpl-meta">
              <span class="tpl-tag" :style="'background:'+t.color+'22;color:'+t.color" x-text="t.category"></span>
              <span class="tpl-tag" style="background:var(--bg3);color:var(--tx3)" x-text="t.items+' items'"></span>
            </div>
            <button class="tpl-use-btn">Use template</button>
          </div>
        </template>
      </div>
      <div class="empty-state" x-show="filteredTemplates.length === 0">
        <div style="font-size:24px;margin-bottom:8px">&#x1F50D;</div>
        <div>No templates match your search</div>
      </div>
    </div>
  </div>
  <nav class="bnav"><div class="bnav-inner">
    <a href="index.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</a>
    <a href="habits.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Habits</a>
    <a href="tasks.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Tasks</a>
    <a href="maintenance.html" class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Maint.</a>
    <div class="bnav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>More</div>
  </div></nav>
</body>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
<script>
function pageApp(){
  return {
    search: '',
    cat: 'all',
    templates: [
      { id:1, name:'Morning Routine', desc:'Daily morning habits: exercise, meditation, journaling, and breakfast tracking', icon:'&#x1F305;', category:'routines', color:'var(--wn)', items:5 },
      { id:2, name:'Weekly Review', desc:'End-of-week task review, habit stats check, and next week planning', icon:'&#x1F4CB;', category:'tasks', color:'var(--inf)', items:8 },
      { id:3, name:'Home Deep Clean', desc:'Full home maintenance checklist: all rooms, appliances, and outdoor areas', icon:'&#x1F9F9;', category:'maintenance', color:'var(--pu)', items:12 },
      { id:4, name:'Fitness Program', desc:'6-week strength training habit with progressive overload tracking', icon:'&#x1F4AA;', category:'habits', color:'var(--dn)', items:6 },
      { id:5, name:'Side Project Launch', desc:'Project template from idea to launch: tasks, milestones, and deliverables', icon:'&#x1F680;', category:'projects', color:'var(--ac)', items:15 },
      { id:6, name:'Grocery Run', desc:'Weekly grocery shopping task list with categories and common items', icon:'&#x1F6D2;', category:'tasks', color:'var(--wn)', items:4 },
      { id:7, name:'Seasonal Maintenance', desc:'Quarterly home maintenance: HVAC, gutters, smoke detectors, filters', icon:'&#x1F3E0;', category:'maintenance', color:'var(--inf)', items:9 },
      { id:8, name:'Reading Habit', desc:'Daily reading habit with page goals and weekly summary', icon:'&#x1F4DA;', category:'habits', color:'var(--ac)', items:3 },
      { id:9, name:'Budget Review', desc:'Monthly financial review tasks: expenses, savings, and goals check', icon:'&#x1F4B0;', category:'routines', color:'var(--pu)', items:7 },
      { id:10, name:'Travel Prep', desc:'Pre-trip checklist: packing, bookings, pet care, and home securing', icon:'&#x1F9F3;', category:'tasks', color:'var(--dn)', items:11 },
      { id:11, name:'Language Learning', desc:'Daily language practice habit with vocabulary, speaking, and listening goals', icon:'&#x1F5E3;', category:'habits', color:'var(--wn)', items:4 },
      { id:12, name:'Car Maintenance', desc:'Recurring car care schedule: oil change, tires, fluids, and annual checks', icon:'&#x1F697;', category:'maintenance', color:'var(--inf)', items:6 }
    ],
    get filteredTemplates(){
      var q=this.search.toLowerCase();
      return this.templates.filter(function(t){
        var matchCat=this.cat==='all'||t.category===this.cat;
        var matchQ=!q||t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q);
        return matchCat&&matchQ;
      }.bind(this));
    }
  };
}
</script>
</html>
