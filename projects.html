<style>
.view-toggle{display:flex;gap:4px}
.vtog{padding:4px 10px;border-radius:6px;font-size:11px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);cursor:pointer}
.vtog.active{background:var(--acbg);color:var(--actx);border-color:var(--ac)}
.proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.proj-card{background:var(--bg2);border:1px solid var(--bd);border-top-width:3px;border-radius:10px;padding:14px}
.proj-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}

.proj-label{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--tx2)}
.proj-status{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:4px;display:inline-block}
.proj-status.active{background:var(--acbg);color:var(--actx)}
.proj-status.planning{background:var(--wnbg);color:var(--wntx)}
.proj-stat-row{display:flex;gap:12px;margin:8px 0;flex-wrap:wrap}
.proj-stat{font-size:10px;color:var(--tx3)}
.proj-stat b{color:var(--tx);font-weight:700}
.proj-bar-bg{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:8px}
.proj-bar-fill{height:100%;border-radius:3px}
.proj-list-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd);gap:12px}
[x-cloak]{display:none!important}
</style>

  <script>
  function pageApp() {
    return {
      view: 'grid',
      loading: true,
      error: null,
      projects: [],
      showForm: false,
      editId: null,
      form: { name: '', description: '', status: 'Active', color: '#1D9E75', deadline: '' },
      statusFilter: 'all',

      get filtered() {
        if (this.statusFilter === 'all') return this.projects;
        return this.projects.filter(p => p.status === this.statusFilter);
      },

      async init() {
        await this.fetchProjects();
      },

      async fetchProjects() {
        this.loading = true;
        this.error = null;
        try {
          const res = await fetch('/api/projects');
          if (!res.ok) throw new Error('Failed to load projects: ' + res.status);
          const data = await res.json();
          this.projects = data.map(p => ({
            id: p.Id,
            name: p.Name,
            desc: p.Description,
            status: p.Status,
            color: p.Color || 'var(--ac)',
            pct: p.Pct ?? 0,
            total: p.TotalTasks ?? 0,
            open: p.OpenTasks ?? 0,
            done: p.DoneTasks ?? 0,
            daysLeft: p.DaysLeft ?? 0,
            deadline: p.Deadline
              ? new Date(p.Deadline).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
              : '---',
            label: p.Label || p.Status,
          }));
        } catch (err) {
          this.error = err.message;
          console.error('[projects] fetchProjects:', err);
        } finally {
          this.loading = false;
        }
      },

      openAddForm() {
        this.editId = null;
        this.form = { name: '', description: '', status: 'Active', color: '#1D9E75', deadline: '' };
        this.showForm = true;
      },

      openEditForm(p) {
        this.editId = p.id;
        this.form = { name: p.name, description: p.desc, status: p.status, color: p.color, deadline: p.deadline };
        this.showForm = true;
      },

      async saveProject() {
        if (!this.form.name.trim()) return;
        try {
          const res = await fetch('/api/projects', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: this.form.name,
              description: this.form.description,
              status: this.form.status,
              color: this.form.color,
              deadline: this.form.deadline || null,
            }),
          });
          if (!res.ok) throw new Error('Failed to create project: ' + res.status);
          this.showForm = false;
          await this.fetchProjects();
        } catch (err) {
          this.error = err.message;
          console.error('[projects] saveProject:', err);
        }
      },

      async updateProject(id) {
        try {
          const res = await fetch('/api/projects/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: this.form.name,
              description: this.form.description,
              status: this.form.status,
              color: this.form.color,
              deadline: this.form.deadline || null,
            }),
          });
          if (!res.ok) throw new Error('Failed to update project: ' + res.status);
          this.showForm = false;
          this.editId = null;
          await this.fetchProjects();
        } catch (err) {
          this.error = err.message;
          console.error('[projects] updateProject:', err);
        }
      },

      async deleteProject(id) {
        if (!confirm('Delete this project?')) return;
        try {
          const res = await fetch('/api/projects/' + id, { method: 'DELETE' });
          if (!res.ok) throw new Error('Failed to delete project: ' + res.status);
          await this.fetchProjects();
        } catch (err) {
          this.error = err.message;
          console.error('[projects] deleteProject:', err);
        }
      },

      async submitForm() {
        if (this.editId) {
          await this.updateProject(this.editId);
        } else {
          await this.saveProject();
        }
      },
    }
  }
    </script>
