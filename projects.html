<style>
.view-toggle{display:flex;gap:4px}
.vtog{padding:4px 10px;border-radius:6px;font-size:11px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);cursor:pointer}
.vtog.active{background:var(--acbg);color:var(--actx);border-color:var(--ac)}
.proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.proj-card{background:var(--bg2);border:1px solid var(--bd);border-top-width:3px;border-radius:10px;padding:14px}
.proj-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.proj-title{font-size:14px;font-weight:700;color:var(--tx)}
.proj-desc{font-size:10px;color:var(--tx3);margin-top:3px}
.proj-label{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--tx2)}
.proj-status{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:4px;display:inline-block}
.proj-status.active{background:var(--acbg);color:var(--actx)}
.proj-status.planning{background:var(--wnbg);color:var(--wntx)}
.proj-stat-row{display:flex;gap:12px;margin:8px 0;flex-wrap:wrap}
.proj-stat{font-size:10px;color:var(--tx3)}
.proj-stat b{color:var(--tx);font-weight:700}
.proj-bar-bg{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:8px}
.proj-bar-fill{height:100%;border-radius:3px}
.proj-list-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd);gap:12px}
[x-cloak]{display:none!important}
</style>
</head>
