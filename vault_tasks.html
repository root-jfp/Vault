
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#191816;--bg2:#222120;--bg3:#2c2b28;--bg4:#353431;--tx:#e4e2dc;--tx2:#a8a69f;--tx3:#6e6d68;--bd:#333230;--ac:#1D9E75;--acbg:rgba(29,158,117,.15);--actx:#5DCAA5;--dn:#E24B4A;--dnbg:rgba(226,75,74,.15);--dntx:#F09595;--wn:#EF9F27;--wnbg:rgba(239,159,39,.15);--wntx:#FAC775;--inf:#378ADD;--infbg:rgba(55,138,221,.15);--inftx:#85B7EB;--pu:#7F77DD;--pubg:rgba(127,119,221,.15);--putx:#AFA9EC;--done:rgba(29,158,117,.18);--donetx:#5DCAA5;--card:#1f1e1c;--cardb:#2a2926}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:13px;line-height:1.45;height:100%;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--bd)}
.topbar-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-user{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--tx2);text-decoration:none}
.topbar-user:hover{background:var(--bg3)}
.topbar-av{width:26px;height:26px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:11px}
.topbar-cog{width:30px;height:30px;border-radius:6px;border:none;background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center}
.topbar-cog:hover{background:var(--bg3);color:var(--tx)}
.topbar-cog svg{width:16px;height:16px}
.layout{display:flex;height:calc(100vh - 49px);overflow:hidden}
.left{width:12vw;min-width:180px;flex-shrink:0;padding:14px;border-right:1px solid var(--bd);overflow-y:auto;height:100%;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.left::-webkit-scrollbar{width:4px}
.left::-webkit-scrollbar-track{background:transparent}
.left::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
.left::-webkit-scrollbar-thumb:hover{background:var(--bd)}
.right{flex:1;padding:16px 20px;overflow:hidden;min-width:0;height:100%;display:flex;flex-direction:column}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-track{background:transparent}
.right::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
.right::-webkit-scrollbar-thumb:hover{background:var(--bd)}

.lblock{margin-bottom:14px}
.lblock-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx2);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.lblock-title svg{width:11px;height:11px}
.lnav-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;color:var(--tx2);cursor:pointer;text-decoration:none}
.lnav-item:hover{color:var(--tx)}
.lnav-item svg{width:11px;height:11px;flex-shrink:0;opacity:.5}
.hstat{margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--bd)}
.hstat:last-child{border:none;margin:0;padding:0}
.hstat-name{font-size:11px;font-weight:500;display:flex;align-items:center;gap:5px;margin-bottom:2px}
.hstat-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.hstat-row{font-size:10px;color:var(--tx3);padding:1px 0}
.hstat-row.good{color:var(--actx)}
.hstat-row.warn{color:var(--wntx)}
.hstat-row.bad{color:var(--dntx)}

/* Page header */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-shrink:0}
.page-hdr h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.btn-primary{background:var(--ac);color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none;transition:opacity .2s}
.btn-primary:hover{opacity:.85}
.btn-primary svg{width:14px;height:14px}

/* Controls bar */
.controls{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-shrink:0}
.filter-tabs{display:flex;gap:4px;font-size:11px}
.filter-tab{padding:4px 10px;border-radius:6px;color:var(--tx3);cursor:pointer;border:1px solid transparent;transition:all .2s}
.filter-tab:hover{color:var(--tx);background:var(--bg3)}
.filter-tab.active{background:var(--tx);color:var(--bg);font-weight:600}
.view-toggle{display:flex;gap:3px;margin-left:auto}
.view-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.view-btn:hover{background:var(--bg3);color:var(--tx)}
.view-btn.active{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.view-btn svg{width:14px;height:14px}

/* === KANBAN === */
.kanban{display:flex;gap:10px;flex:1;overflow-x:auto;overflow-y:hidden;padding-bottom:8px;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.kanban::-webkit-scrollbar{height:4px}
.kanban::-webkit-scrollbar-track{background:transparent}
.kanban::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}

.kb-col{background:var(--card);border:1px solid var(--cardb);border-radius:10px;flex:0 0 260px;min-width:260px;max-height:100%;display:flex;flex-direction:column;overflow:hidden}
.kb-col-hdr{display:flex;align-items:center;gap:6px;padding:10px 12px;border-bottom:1px solid var(--bd);flex-shrink:0}
.kb-col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kb-col-name{font-size:12px;font-weight:600}
.kb-col-count{font-size:10px;color:var(--tx3);margin-left:auto;background:var(--bg3);padding:1px 6px;border-radius:4px}
.kb-col-add{width:22px;height:22px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;margin-left:4px;transition:all .2s}
.kb-col-add:hover{border-color:var(--ac);color:var(--ac);background:var(--acbg)}

.kb-col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:60px;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.kb-col-body::-webkit-scrollbar{width:3px}
.kb-col-body::-webkit-scrollbar-track{background:transparent}
.kb-col-body::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

/* Kanban card */
.kb-card{background:var(--bg);border:1px solid var(--bd);border-radius:7px;padding:10px 11px;cursor:grab;transition:border-color .2s,box-shadow .2s}
.kb-card:hover{border-color:var(--tx3)}
.kb-card.sortable-ghost{opacity:.4;border:1.5px dashed var(--ac)}
.kb-card.sortable-chosen{box-shadow:0 4px 12px rgba(0,0,0,.3);border-color:var(--ac)}
.kb-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.kb-tag{font-size:8px;padding:2px 6px;border-radius:3px;font-weight:600}
.kb-card-title{font-size:11px;font-weight:600;margin-bottom:3px}
.kb-card-desc{font-size:10px;color:var(--tx3);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.kb-card-footer{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--tx3)}
.kb-card-footer svg{width:10px;height:10px;flex-shrink:0}
.kb-card-footer .overdue{color:var(--dntx)}
.kb-card-footer .due-soon{color:var(--wntx)}
.kb-card-footer .project-link{color:var(--inftx)}

.kb-add-btn{border:1px dashed var(--bd);border-radius:7px;padding:8px;text-align:center;font-size:10px;color:var(--tx3);cursor:pointer;flex-shrink:0;margin:0 8px 8px;transition:all .2s}
.kb-add-btn:hover{border-color:var(--tx3);color:var(--tx2)}

.kb-add-col{flex:0 0 260px;min-width:260px;border:1px dashed var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:11px;cursor:pointer;min-height:100px;transition:all .2s}
.kb-add-col:hover{border-color:var(--tx3);color:var(--tx2)}

/* === LIST VIEW === */
.task-list{display:none;flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.task-list.active{display:block}
.tl-header{display:grid;grid-template-columns:24px 2fr 100px 80px 100px 90px 60px;gap:8px;padding:8px 12px;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd)}
.tl-row{display:grid;grid-template-columns:24px 2fr 100px 80px 100px 90px 60px;gap:8px;padding:8px 12px;font-size:11px;border-bottom:1px solid var(--bd);align-items:center;transition:background .15s}
.tl-row:hover{background:var(--bg3)}
.tl-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tl-check:hover{border-color:var(--ac)}
.tl-check.done{background:var(--ac);border-color:var(--ac)}
.tl-check.done svg{opacity:1}
.tl-check svg{width:11px;height:11px;opacity:0;transition:opacity .2s}
.tl-title{font-weight:500}
.tl-title .sub{font-size:9px;color:var(--tx3);display:block;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-col{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx3)}
.tl-col-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tl-actions{display:flex;gap:3px}
.act-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.act-btn:hover{background:var(--bg3);color:var(--tx);border-color:var(--tx3)}
.act-btn.delete:hover{color:var(--dntx);border-color:var(--dn);background:var(--dnbg)}
.act-btn svg{width:11px;height:11px}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--tx3)}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.3}
.empty-state h3{font-size:15px;color:var(--tx2);margin-bottom:6px;font-weight:600}
.empty-state p{font-size:12px;margin-bottom:16px}

@media(max-width:900px){.kb-col{flex:0 0 220px;min-width:220px}.tl-header,.tl-row{grid-template-columns:24px 1.5fr 80px 70px 80px}}
@media(max-width:700px){.layout{flex-direction:column}.left{width:100%;border-right:none;border-bottom:1px solid var(--bd);max-height:200px}.kanban{overflow-x:auto}.kb-col{flex:0 0 85vw;min-width:85vw}.tl-header,.tl-row{grid-template-columns:24px 1fr 70px 60px}}
</style>

var currentFilter='all';

function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function parseDate(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function daysDiff(a,b){return Math.round((a-b)/(1000*60*60*24))}

function formatDue(dateStr){
if(!dateStr)return{text:'No date',cls:''};
var d=parseDate(dateStr);
var diff=daysDiff(d,TODAY);
if(diff<0)return{text:'Overdue ('+Math.abs(diff)+'d)',cls:'overdue'};
if(diff===0)return{text:'Due today',cls:'due-soon'};
if(diff<=3)return{text:'Due in '+diff+'d',cls:'due-soon'};
var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
return{text:d.getDate()+' '+months[d.getMonth()],cls:''};
}

function getFiltered(){
var t=tasks.slice();
if(currentFilter==='completed')return t.filter(function(x){return x.columnId===4});
if(currentFilter==='priority'){
var order={urgent:0,high:1,medium:2,low:3};
t.sort(function(a,b){return(order[a.priority]||9)-(order[b.priority]||9)});
}
if(currentFilter==='dueDate'){
t.sort(function(a,b){
if(!a.dueDate)return 1;if(!b.dueDate)return -1;
return a.dueDate.localeCompare(b.dueDate);
});
}
if(currentFilter==='project'){
t.sort(function(a,b){return(a.projectName||'zzz').localeCompare(b.projectName||'zzz')});
}
return t;
}

function cardHtml(t){
var p=PRIORITY_MAP[t.priority]||PRIORITY_MAP.medium;
var due=formatDue(t.dueDate);
var h='<div class="kb-card" data-task-id="'+t.id+'">';
h+='<div class="kb-card-tags">';
h+='<span class="kb-tag" style="background:'+p.bg+';color:'+p.tx+'">'+p.label+'</span>';
if(t.label)h+='<span class="kb-tag" style="background:color-mix(in srgb,'+t.labelColor+' 15%,transparent);color:'+t.labelColor+'">'+t.label+'</span>';
h+='</div>';
h+='<div class="kb-card-title">'+t.title+'</div>';
if(t.description)h+='<div class="kb-card-desc">'+t.description+'</div>';
h+='<div class="kb-card-footer">';
if(t.dueDate)h+='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="'+due.cls+'">'+due.text+'</span>';
if(t.projectName)h+='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:4px"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span class="project-link">'+t.projectName+'</span>';
h+='</div></div>';
return h;
}

function renderKanban(){
var board=document.getElementById('kanban-board');
var filtered=getFiltered();
var html='';
columns.forEach(function(col){
var colTasks=filtered.filter(function(t){return t.columnId===col.id}).sort(function(a,b){return a.position-b.position});
html+='<div class="kb-col" data-col-id="'+col.id+'">';
html+='<div class="kb-col-hdr"><div class="kb-col-dot" style="background:'+col.color+'"></div><div class="kb-col-name">'+col.name+'</div><div class="kb-col-count">'+colTasks.length+'</div><button class="kb-col-add" onclick="window.location.href=\'vault_task_new.html\'">+</button></div>';
html+='<div class="kb-col-body">';
colTasks.forEach(function(t){html+=cardHtml(t)});
html+='</div>';
html+='<div class="kb-add-btn" onclick="window.location.href=\'vault_task_new.html\'">+ Add task</div>';
html+='</div>';
});
html+='<div class="kb-add-col">+ Add column</div>';
board.innerHTML=html;
initSortable();
}

function renderList(){
var list=document.getElementById('task-list');
var filtered=getFiltered();
var checkSvg='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
var editSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
var delSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

var html='<div class="tl-header"><div></div><div>Title</div><div>Column</div><div>Priority</div><div>Label</div><div>Due Date</div><div>Actions</div></div>';
filtered.forEach(function(t){
var p=PRIORITY_MAP[t.priority]||PRIORITY_MAP.medium;
var due=formatDue(t.dueDate);
var isDone=t.columnId===4;
var col=columns.find(function(c){return c.id===t.columnId});
html+='<div class="tl-row">';
html+='<div class="tl-check'+(isDone?' done':'')+'" data-task-id="'+t.id+'">'+checkSvg+'</div>';
html+='<div class="tl-title"'+(isDone?' style="text-decoration:line-through;opacity:.6"':'')+'>'+t.title+(t.description?'<span class="sub">'+t.description+'</span>':'')+'</div>';
html+='<div class="tl-col"><div class="tl-col-dot" style="background:'+(col?col.color:'var(--tx3)')+'"></div>'+(col?col.name:'')+'</div>';
html+='<span class="kb-tag" style="background:'+p.bg+';color:'+p.tx+'">'+p.label+'</span>';
if(t.label)html+='<span class="kb-tag" style="background:color-mix(in srgb,'+t.labelColor+' 15%,transparent);color:'+t.labelColor+'">'+t.label+'</span>';
else html+='<div></div>';
html+='<div class="'+due.cls+'">'+due.text+'</div>';
html+='<div class="tl-actions"><button class="act-btn" title="Edit">'+editSvg+'</button><button class="act-btn delete" title="Delete">'+delSvg+'</button></div>';
html+='</div>';
});
list.innerHTML=html;

/* list checkbox toggle */
list.querySelectorAll('.tl-check').forEach(function(el){
el.addEventListener('click',function(){
var id=parseInt(el.getAttribute('data-task-id'));
tasks=tasks.map(function(t){
if(t.id===id)return Object.assign({},t,{columnId:t.columnId===4?1:4});
return t;
});
renderList();
renderSidebarStats();
});
});
}

function initSortable(){
if(typeof Sortable==='undefined')return;
document.querySelectorAll('.kb-col-body').forEach(function(body){
new Sortable(body,{
group:'tasks',
animation:150,
ghostClass:'sortable-ghost',
chosenClass:'sortable-chosen',
onEnd:function(evt){
var taskId=parseInt(evt.item.getAttribute('data-task-id'));
var newColId=parseInt(evt.to.closest('.kb-col').getAttribute('data-col-id'));
var newPos=evt.newIndex;
tasks=tasks.map(function(t){
if(t.id===taskId)return Object.assign({},t,{columnId:newColId,position:newPos});
return t;
});
reindexColumn(parseInt(evt.from.closest('.kb-col').getAttribute('data-col-id')));
reindexColumn(newColId);
renderSidebarStats();
}
});
});
}

function reindexColumn(colId){
var body=document.querySelector('.kb-col[data-col-id="'+colId+'"] .kb-col-body');
if(!body)return;
var cards=body.querySelectorAll('.kb-card');
cards.forEach(function(card,i){
var id=parseInt(card.getAttribute('data-task-id'));
tasks=tasks.map(function(t){
if(t.id===id)return Object.assign({},t,{position:i});
return t;
});
});
/* update column count */
var count=body.querySelectorAll('.kb-card').length;
var hdr=body.closest('.kb-col').querySelector('.kb-col-count');
if(hdr)hdr.textContent=count;
}

function renderSidebarStats(){
var el=document.getElementById('sidebar-stats');
var html='';
columns.forEach(function(col){
var count=tasks.filter(function(t){return t.columnId===col.id}).length;
html+='<div class="hstat"><div class="hstat-name"><div class="hstat-dot" style="background:'+col.color+'"></div>'+col.name+'</div><div class="hstat-row">'+count+' task'+(count!==1?'s':'')+'</div></div>';
});
var overdue=tasks.filter(function(t){return t.columnId!==4&&t.dueDate&&parseDate(t.dueDate)<TODAY}).length;
var dueWeek=tasks.filter(function(t){if(t.columnId===4||!t.dueDate)return false;var d=parseDate(t.dueDate);var diff=daysDiff(d,TODAY);return diff>=0&&diff<=7}).length;
var total=tasks.length;
var done=tasks.filter(function(t){return t.columnId===4}).length;
var rate=total>0?Math.round(done/total*100):0;
html+='<div class="hstat"><div class="hstat-name" style="margin-top:4px"><div class="hstat-dot" style="background:var(--dn)"></div>Summary</div>';
html+='<div class="hstat-row'+(overdue>0?' bad':'')+'">Overdue: '+overdue+'</div>';
html+='<div class="hstat-row'+(dueWeek>0?' warn':'')+'">Due this week: '+dueWeek+'</div>';
html+='<div class="hstat-row good">Completion: '+rate+'%</div></div>';
el.innerHTML=html;
}

/* View toggle */
document.querySelectorAll('.view-btn').forEach(function(btn){
btn.addEventListener('click',function(){
document.querySelectorAll('.view-btn').forEach(function(b){b.classList.remove('active')});
btn.classList.add('active');
currentView=btn.getAttribute('data-view');
var board=document.getElementById('kanban-board');
var list=document.getElementById('task-list');
if(currentView==='kanban'){board.style.display='flex';list.className='task-list';renderKanban();}
else{board.style.display='none';list.className='task-list active';renderList();}
});
});

/* Filter tabs */
document.querySelectorAll('.filter-tab').forEach(function(tab){
tab.addEventListener('click',function(){
document.querySelectorAll('.filter-tab').forEach(function(t){t.classList.remove('active')});
tab.classList.add('active');
currentFilter=tab.getAttribute('data-filter');
if(currentView==='kanban')renderKanban();else renderList();
});
});

renderKanban();
renderSidebarStats();
})();
</script>
