  <script>
  function pageApp() {
    return {
      view: 'kanban',
      filter: 'all',
      columns: [],
      _sortables: [],

      async init() {
        await this.loadColumns();
      },

      async loadColumns() {
        try {
          const res = await fetch('/api/tasks/columns');
          if (res.ok) {
            const cols = await res.json();
            this.columns = cols;
            this.$nextTick(() => this.initSortable());
          }
        } catch (e) {
          console.error('Failed to load tasks:', e);
        }
      },

      initSortable() {
        this._sortables.forEach(s => s.destroy());
        this._sortables = [];
        document.querySelectorAll('.kb-cards').forEach(el => {
          const colEl = el.closest('[data-col-id]');
          const s = Sortable.create(el, {
            group: 'tasks',
            animation: 150,
            draggable: '.kb-card',
            onEnd: async (evt) => {
              const taskId = parseInt(evt.item.dataset.taskId);
              const targetColId = parseInt(evt.to.closest('[data-col-id]').dataset.colId);
              const newPos = evt.newIndex;
              try {
                const res = await fetch(`/api/tasks/${taskId}/move`, {
                  method: 'PATCH',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ columnId: targetColId, position: newPos }),
                });
                if (res.ok) {
                  this.columns = await res.json();
                  this.$nextTick(() => this.initSortable());
                } else {
                  await this.loadColumns();
                }
              } catch (e) {
                console.error('Move failed:', e);
                await this.loadColumns();
              }
            }
          });
          this._sortables.push(s);
        });
      },

      async addTask() {
        const title = prompt('Task title:');
        if (!title) return;
        if (title.length > 300) { alert('Title must be 300 characters or fewer.'); return; }
        try {
          const res = await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, priority: 'med' }),
          });
          if (res.ok) await this.loadColumns();
        } catch (e) {
          console.error('Failed to create task:', e);
        }
      },

      async deleteTask(taskId) {
        try {
          const res = await fetch(`/api/tasks/${taskId}`, { method: 'DELETE' });
          if (res.ok) await this.loadColumns();
        } catch (e) {
          console.error('Failed to delete task:', e);
        }
      },

      todayIso() { return new Date().toISOString().slice(0, 10); },

      get allTasks() { return this.columns.flatMap(c => c.tasks); },
      get filteredTasks() {
        const today = this.todayIso();
        const t = this.allTasks;
        if (this.filter === 'today') return t.filter(t => t.due === today);
        if (this.filter === 'high')  return t.filter(t => t.priority === 'high');
        return t;
      },
      filteredCols() {
        if (this.filter === 'all') return this.columns;
        const today = this.todayIso();
        return this.columns.map(c => ({...c, tasks: c.tasks.filter(t => {
          if (this.filter === 'today') return t.due === today;
          if (this.filter === 'high')  return t.priority === 'high';
          return true;
        })}));
      },
    }
  }
  </script>
